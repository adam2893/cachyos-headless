; supervisord.conf for CachyOS Headless
; Uses include pattern like Steam-Headless/docker-steam-headless

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
minfds=4096
childlogdir=/var/log/supervisor

[include]
files = /etc/supervisor.d/*.ini
